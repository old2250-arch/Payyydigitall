<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Two Pay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-out;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #0f2b3d 0%, #1b4f72 100%);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <div class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-blue-100 animate-fadeIn">
            <!-- Header -->
            <div class="gradient-bg px-6 py-8 text-center">
                <h1 class="text-3xl font-bold text-white">Deposit Two Pay</h1>
                <p class="text-blue-100 mt-2">Isi formulir untuk melakukan deposit</p>
            </div>

            <!-- Form -->
            <form id="depositForm" class="p-6 space-y-5" enctype="multipart/form-data">
                <!-- Username Two Pay -->
                <div>
                    <label for="username" class="block text-gray-700 font-semibold mb-2">
                        Username Akun Two Pay
                    </label>
                    <input type="text" id="username" name="username" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        placeholder="Masukkan username Two Pay">
                </div>

                <!-- Nominal Deposit -->
                <div>
                    <label for="amount" class="block text-gray-700 font-semibold mb-2">
                        Nominal Deposit (IDR)
                    </label>
                    <input type="number" id="amount" name="amount" required min="10000" step="1000"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        placeholder="Minimal 10.000">
                </div>

                <!-- Upload Bukti Transfer -->
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">
                        Bukti Transfer (Foto/ Screenshot)
                    </label>
                    <div class="flex items-center justify-center w-full">
                        <label for="fileUpload" class="flex flex-col w-full h-32 border-2 border-blue-200 border-dashed rounded-lg cursor-pointer hover:bg-blue-50 transition">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                <svg class="w-8 h-8 text-blue-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                </svg>
                                <p class="text-sm text-gray-500">Klik untuk upload atau tarik file</p>
                                <p class="text-xs text-gray-400">PNG, JPG, JPEG (Maks. 5MB)</p>
                            </div>
                            <input type="file" id="fileUpload" name="file" accept="image/*" class="hidden" required>
                        </label>
                    </div>
                    <div id="fileInfo" class="text-sm text-green-600 mt-1 hidden"></div>
                </div>

                <!-- Message Area -->
                <div id="message" class="p-3 rounded-lg text-sm hidden"></div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                    Kirim Deposit
                </button>
            </form>

            <div class="text-center text-xs text-gray-400 py-4 border-t border-gray-100">
                © 2025 Two Pay • Deposit akan diproses oleh admin
            </div>
        </div>
    </div>

    <script>
        // Tampilkan nama file yang dipilih
        const fileInput = document.getElementById('fileUpload');
        const fileInfo = document.getElementById('fileInfo');
        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                const file = this.files[0];
                fileInfo.textContent = `✓ ${file.name} (${Math.round(file.size / 1024)} KB)`;
                fileInfo.classList.remove('hidden');
            } else {
                fileInfo.classList.add('hidden');
            }
        });

        // Handle form submit
        const form = document.getElementById('depositForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Reset message
            messageDiv.classList.add('hidden');
            messageDiv.innerHTML = '';

            const formData = new FormData(form);
            const username = formData.get('username');
            const amount = formData.get('amount');
            const file = formData.get('file');

            // Validasi sederhana
            if (!username || !amount || !file) {
                showMessage('Semua field harus diisi!', 'error');
                return;
            }
            if (parseInt(amount) < 10000) {
                showMessage('Minimal deposit Rp 10.000', 'error');
                return;
            }

            // Disable button saat proses
            submitBtn.disabled = true;
            submitBtn.textContent = 'Mengirim...';

            try {
                const response = await fetch('/api/deposit', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    showMessage('Deposit berhasil dikirim! Admin akan segera memproses.', 'success');
                    form.reset();
                    fileInfo.classList.add('hidden');
                } else {
                    showMessage(result.error || 'Terjadi kesalahan. Silakan coba lagi.', 'error');
                }
            } catch (err) {
                showMessage('Gagal terhubung ke server. Periksa koneksi internet Anda.', 'error');
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Kirim Deposit';
            }
        });

        function showMessage(text, type) {
            messageDiv.innerHTML = text;
            messageDiv.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
            if (type === 'success') {
                messageDiv.classList.add('bg-green-100', 'text-green-700');
            } else {
                messageDiv.classList.add('bg-red-100', 'text-red-700');
            }
            // Auto hide after 5 seconds
            setTimeout(() => {
                messageDiv.classList.add('hidden');
            }, 5000);
        }
    </script>
</body>
</html>
